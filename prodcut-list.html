  <main class="container mx-auto px-4 pb-8 mb-24">

        <input id="pageSearchInputDesktop" type="text" placeholder="Search products..." class="w-full pl-10 pr-24 py-2.5 bg-black/60 border border-gold-500 rounded-xl text-white text-sm focus:outline-none focus:border-gold-500">
        <div class="absolute left-3 top-1/2 -translate-y-1/2 text-gold-500 pointer-events-none">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>

    <!-- Price Filter -->
    <div class="flex items-center gap-2 mb-3">
      <span class="text-[9px] font-bold text-gray-500 uppercase tracking-widest whitespace-nowrap">Filter Budget</span>
      <input type="number" id="priceMin" placeholder="Min ₹" min="0" value="0"

        oninput="applyPriceFilter()">
      <span class="text-gray-500 text-xs">to</span>
      <input type="number" id="priceMax" placeholder="Max ₹" min="0"
        class="w-28 bg-black/60 border border-gold-500/30 rounded-xl px-3 py-2 text-white text-sm focus:outline-none focus:border-gold-500 placeholder:text-gray-600"
        oninput="applyPriceFilter()">
    </div>

    <h1 class="text-2xl md:text-4xl font-black gold-gradient-text uppercase tracking-widest mb-2">Product List</h1>
    <p id="resultMeta" class="text-white/70 text-sm mb-6"></p>
    <div id="resultGrid" class="grid grid-cols-2 md:grid-cols-4 xl:grid-cols-5 gap-3 md:gap-6"></div>
  </main>

  <div class="fixedBottom" style="box-sizing: border-box; width: 100%; max-width: 100vw;z-index: 25;">
    <a href="https://b-oneinterior.com/" class="logoBx"></a>
    <ul>
      <li class="relative">
        <a href="profile.html" class="flex flex-col items-center justify-center gap-1 transition-all active:scale-90">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
          </svg>
          <div class="text-[12px] tracking-tighter">Account</div>
        </a>
      </li>
      <li class="relative">
        <a href="https://b-oneinterior.com/wishlist" class="flex flex-col items-center justify-center gap-1 transition-all active:scale-90">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
          </svg>
          <div class="text-[12px] tracking-tighter">Wishlist</div>
          <span class="wishlist-badge absolute -top-1 right-2 bg-gold text-black text-[9px] font-black w-4 h-4 flex items-center justify-center rounded-full shadow-lg border border-black/20" style="display:none;"></span>
        </a>
      </li>
      <li class="mt-7 active:scale-90 tracking-tighter text-gold-500"> Home</li>
      <li class="relative">
        <a id="mobileCartLink" href="https://b-oneinterior.com/cart" class="flex flex-col items-center justify-center gap-1 transition-all active:scale-90">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-gold">
            <circle cx="9" cy="21" r="1"></circle>
            <circle cx="20" cy="21" r="1"></circle>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
          </svg>
          <div class="text-[12px] tracking-tighter">Cart</div>
          <span id="cartCountBadge" class="absolute -top-1 right-2 bg-gold text-black text-[9px] font-black w-4 h-4 flex items-center justify-center rounded-full shadow-lg border border-black/20 hidden"></span>
        </a>
      </li>
      <li>
        <a href="#" onclick="toggleDrawer(); return false;"
            class="flex flex-col items-center justify-center gap-1 transition-all active:scale-90">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path d="M3 6H21"/><path d="M3 12H21"/><path d="M3 18H21"/>
            </svg>
            <div class="text-[12px] tracking-tighter">Menu</div>
        </a>
      </li>
    </ul>

  <script>
    const FALLBACK_IMG = "images/placeholder.png";
    const API_URL = "https://api.b-oneinterior.com/graphql/";
    function toggleDrawer() {
      const drawer = document.getElementById("drawer");
      const overlay = document.querySelector(".overlay");
      if (drawer.style.left === "0px") {
        drawer.style.left = "-250px";
        overlay.style.opacity = "0";
        overlay.style.pointerEvents = "none";
      } else {
        drawer.style.left = "0px";
        overlay.style.opacity = "1";
        overlay.style.pointerEvents = "auto";
      }
    }

    const overlay = document.querySelector(".overlay");
    if (overlay) {
      overlay.addEventListener("click", () => {
        const drawer = document.getElementById("drawer");
        drawer.style.left = "-250px";
        overlay.style.opacity = "0";
        overlay.style.pointerEvents = "none";
      });
    }

    function updateCartBadge() {
      const badge = document.getElementById("cartCountBadge");
      if (!badge) return;
      const list = JSON.parse(localStorage.getItem("inquiryList") || "[]");
      const count = list.length;
      if (count > 0) { badge.textContent = count; badge.classList.remove("hidden"); }
      else badge.classList.add("hidden");
    }

    function escapeHtml(s) { return String(s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/"/g, "&quot;"); }

    function getActualPriceFromAttrs(attrs) {
      const attr = (attrs || []).find(a => String(a.attribute?.name || "").toLowerCase() === "actual price");
      return attr?.values?.[0]?.name || null;
    }

    function getSavePercent(product) {
      let best = null;
      const consider = (actualRaw, sellingRaw) => {
        const actualVal = parseFloat(String(actualRaw || "").replace(/[^0-9.]/g, ""));
        const sellingVal = Number(sellingRaw || 0);
        if (!isNaN(actualVal) && actualVal > 0 && sellingVal > 0 && actualVal > sellingVal) {
          const savePercent = Math.round(((actualVal - sellingVal) / actualVal) * 100);
          if (savePercent > 0 && (!best || savePercent > best)) best = savePercent;
        }
      };

      consider(
        getActualPriceFromAttrs(product.attributes),
        product.pricing?.priceRange?.start?.gross?.amount
      );

      (product.variants || []).forEach(v => {
        consider(
          getActualPriceFromAttrs(v.attributes),
          v.pricing?.price?.gross?.amount || product.pricing?.priceRange?.start?.gross?.amount
        );
      });

      return best;
    }

    function getDisplayItems(products) {
      return products.map(p => ({
        type: "product",
        product: p,
        linkId: p.variants?.[0]?.id || p.id,
        title: p.name
      }));
    }

    function renderCards(items, query) {
      const grid = document.getElementById("resultGrid");
      const meta = document.getElementById("resultMeta");
      meta.textContent = `Search: "${query}" • ${items.length} result(s)`;
      if (!items.length) {
        grid.innerHTML = `<div class="col-span-full text-center text-white/60 py-16">No products found.</div>`;
        return;
      }
      const q = query.toLowerCase();
      grid.innerHTML = items.map(item => {
        const p = item.product;
        const gross = p.pricing?.priceRange?.start?.gross;
        const price = Number(gross?.amount || 0).toFixed(2);
        const cur = gross?.currency || "INR";
        const priceText = cur === "INR" ? `₹${price}` : `${price} ${cur}`;
        const savePercent = getSavePercent(p);
        // Check if query matches a variant name
        let imgUrl = p.thumbnail?.url || FALLBACK_IMG;
        if (q && p.variants) {
          const matchedVariant = p.variants.find(v => v.name && v.name.toLowerCase().includes(q));
          if (matchedVariant) {
            const variantMedia = matchedVariant.media?.[0]?.url || matchedVariant.thumbnail?.url;
            if (variantMedia) imgUrl = variantMedia;
          }
        }
        const priceAmount = Number(gross?.amount || 0);
        return `
          <a href="product.html?id=${item.linkId}" data-product-price="${priceAmount}" class="creative-card flex flex-col group cursor-pointer h-full">
            <div class="relative overflow-hidden aspect-square">
              <img src="${imgUrl}" loading="lazy" decoding="async" onerror="this.onerror=null;this.src='${FALLBACK_IMG}';" class="w-full h-full object-cover transition duration-700 group-hover:scale-110" alt="${escapeHtml(p.name)}">
              ${savePercent ? `<span class="absolute top-2 left-2 bg-red-600 text-white text-[9px] font-black px-1.5 py-0.5 rounded-full shadow">${savePercent}% OFF</span>` : ""}
            </div>
            <div class="p-2 flex flex-col flex-grow bg-black/20 backdrop-blur-md">
              <span class="gold-gradient-text text-[10px] font-black uppercase tracking-widest mb-1">${escapeHtml(p.category?.name || "Decor")}</span>
              <h3 class="font-bold text-white text-xs lg:text-sm line-clamp-2 mb-2">${escapeHtml(item.title)}</h3>
              <div class="mt-auto"><span class="gold-gradient-text text-sm font-black">${priceText}</span></div>
            </div>
          </a>`;
      }).join("");
    }

    function applyPriceFilter() {
      const min = parseFloat(document.getElementById('priceMin').value) || 0;
      const max = parseFloat(document.getElementById('priceMax').value) || Infinity;
      let visibleCount = 0;
      const total = document.querySelectorAll('#resultGrid > a').length;
      document.querySelectorAll('#resultGrid > a').forEach(card => {
        const price = parseFloat(card.dataset?.productPrice) || 0;
        const match = price >= min && price <= max;
        card.style.display = match ? '' : 'none';
        if (match) visibleCount++;
      });
      const meta = document.getElementById('resultMeta');
      if (meta) {
        const q = getQueryFromUrl();
        meta.textContent = `Search: "${q}" • ${visibleCount} of ${total} result(s)`;
      }
    }

    function getQueryFromUrl() { return (new URLSearchParams(window.location.search).get("q") || "").trim().toLowerCase(); }
    function syncSearchInputs(value) {
      const m = document.getElementById("pageSearchInput");
      const d = document.getElementById("pageSearchInputDesktop");
      if (m) m.value = value;
      if (d) d.value = value;
    }
    function runSearchFromInput() {
      const m = document.getElementById("pageSearchInput");
      const d = document.getElementById("pageSearchInputDesktop");
      const active = document.activeElement;
      let value = "";
      if (active === d) value = d?.value ?? "";
      else if (active === m) value = m?.value ?? "";
      else value = d?.value || m?.value || "";
      value = value.trim();
      if (!value) return;
      saveSearchHistory(value);
      window.location.href = `prodcut-list.html?q=${encodeURIComponent(value)}`;
    }

    function getSearchHistory() {
      try { return JSON.parse(localStorage.getItem("searchHistory") || "[]"); }
      catch { return []; }
    }

    function saveSearchHistory(term) {
      const history = getSearchHistory().filter(t => t !== term);
      history.unshift(term);
      localStorage.setItem("searchHistory", JSON.stringify(history.slice(0, 5)));
    }

    function renderSearchHistory(forInput) {
      const container = document.getElementById(forInput === "pageSearchInput" ? "searchHistoryMobile" : "searchHistoryDesktop");
      if (!container) return;
      const history = getSearchHistory();
      if (!history.length) { container.classList.add("hidden"); return; }
      container.innerHTML = history.map(t => `
        <button type="button" class="w-full text-left px-4 py-2.5 text-white/80 hover:text-gold-500 hover:bg-gold-500/10 text-sm flex items-center gap-3 transition" data-term="${escapeHtml(t)}">
          <svg class="w-3.5 h-3.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          <span class="truncate">${escapeHtml(t)}</span>
        </button>
      `).join("");
      container.classList.remove("hidden");
      container.querySelectorAll("button").forEach(btn => {
        btn.addEventListener("click", () => {
          const term = btn.dataset.term;
          syncSearchInputs(term);
          updateSearchClearButtons();
          saveSearchHistory(term);
          window.location.href = `prodcut-list.html?q=${encodeURIComponent(term)}`;
        });
      });
    }

    function hideSearchHistory() {
      document.getElementById("searchHistoryMobile")?.classList.add("hidden");
      document.getElementById("searchHistoryDesktop")?.classList.add("hidden");
    }

    function updateSearchClearButtons() {
      const mobileInput = document.getElementById("pageSearchInput");
      const desktopInput = document.getElementById("pageSearchInputDesktop");
      const clearMobile = document.getElementById("pageSearchClearBtn");
      const clearDesktop = document.getElementById("pageSearchClearBtnDesktop");
      const hasValue = ((mobileInput?.value || "").trim().length > 0) || ((desktopInput?.value || "").trim().length > 0);
      if (clearMobile) clearMobile.classList.toggle("hidden", !hasValue);
      if (clearDesktop) clearDesktop.classList.toggle("hidden", !hasValue);
    }

    async function load() {
      const q = getQueryFromUrl();
      const meta = document.getElementById("resultMeta");
      syncSearchInputs(q);
      updateSearchClearButtons();
      if (!q) { meta.textContent = "No search query provided."; return; }
      saveSearchHistory(q);
      meta.textContent = "Loading products...";
      const query = `
        query SearchProducts($search: String!) {
          products(first: 20, filter: { search: $search }, channel: "in") {
            edges {
              node {
                id
                name
                slug
                description
                thumbnail { url }
                media { url type }
                pricing {
                  priceRange {
                    start { gross { amount currency } }
                    stop { gross { amount currency } }
                  }
                }
                category { id name }
                variants {
                  id
                  name
                  media { url type }
                  pricing { price { gross { amount currency } } }
                  attributes { attribute { name } values { name } }
                }
              }
            }
          }
        }`;
      try {
        const productsRes = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ query, variables: { search: q } })
        });
        const json = await productsRes.json();
        const edges = json.data?.products?.edges || [];
        renderCards(getDisplayItems(edges.map(e => e.node)), q);
        applyPriceFilter();
      } catch (e) {
        meta.textContent = "Failed to load products.";
      }
    }

    document.getElementById("pageSearchGoBtn")?.addEventListener("click", runSearchFromInput);
    document.getElementById("pageSearchGoBtnDesktop")?.addEventListener("click", runSearchFromInput);
    document.getElementById("pageSearchInput")?.addEventListener("input", () => updateSearchClearButtons());
    document.getElementById("pageSearchInputDesktop")?.addEventListener("input", () => updateSearchClearButtons());
    document.getElementById("pageSearchInput")?.addEventListener("keydown", e => { if (e.key === "Enter") runSearchFromInput(); });
    document.getElementById("pageSearchInputDesktop")?.addEventListener("keydown", e => { if (e.key === "Enter") runSearchFromInput(); });
    document.getElementById("pageSearchInput")?.addEventListener("focus", () => { renderSearchHistory("pageSearchInput"); });
    document.getElementById("pageSearchInputDesktop")?.addEventListener("focus", () => { renderSearchHistory("pageSearchInputDesktop"); });
    document.getElementById("pageSearchInput")?.addEventListener("blur", () => setTimeout(hideSearchHistory, 200));
    document.getElementById("pageSearchInputDesktop")?.addEventListener("blur", () => setTimeout(hideSearchHistory, 200));
    document.getElementById("pageSearchClearBtn")?.addEventListener("click", () => {
      syncSearchInputs("");
      updateSearchClearButtons();
      document.getElementById("pageSearchInput")?.focus();
    });
    document.getElementById("pageSearchClearBtnDesktop")?.addEventListener("click", () => {
      syncSearchInputs("");
      updateSearchClearButtons();
      document.getElementById("pageSearchInputDesktop")?.focus();
    });

    updateCartBadge();
    load();
  </script>
</body>
