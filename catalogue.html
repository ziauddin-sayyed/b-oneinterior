        <script>
            function toggleDrawer() {
                const drawer = document.getElementById("drawer");
                const overlay = document.querySelector(".overlay");
                if (drawer.style.left === "0px") {
                    drawer.style.left = "-250px";
                    overlay.style.opacity = "0";
                    overlay.style.pointerEvents = "none";
                } else {
                    drawer.style.left = "0px";
                    overlay.style.opacity = "1";
                    overlay.style.pointerEvents = "auto";
                }
            }

            function closeMobileDrawer() {
                const drawer = document.getElementById("drawer");
                const overlay = document.querySelector(".overlay");
                drawer.style.left = "-250px";
                overlay.style.opacity = "0";
                overlay.style.pointerEvents = "none";
            }

            const overlay = document.querySelector(".overlay");
            overlay.addEventListener("click", () => {
                const drawer = document.getElementById("drawer");
                drawer.style.left = "-250px";
                overlay.style.opacity = "0";
                overlay.style.pointerEvents = "none";
            });

            // Auth check and navigation update
            function checkAuth() {
                const token = localStorage.getItem('saleor_auth_token');
                const userEmail = localStorage.getItem('saleor_user_email');
                const desktopLink = document.getElementById('authLinkDesktop');
                const drawerLink = document.getElementById('authLinkDrawer');

                if (token && userEmail) {
                    if (desktopLink) {
                        desktopLink.innerHTML = `<a href="#" onclick="signOut()" class="hover:text-gold-500 transition">Sign Out</a>`;
                    }
                    if (drawerLink) {
                        drawerLink.innerHTML = `<a href="#" onclick="signOut()">Sign Out (${userEmail})</a>`;
                    }
                } else {
                    if (desktopLink) {
                        desktopLink.innerHTML = `<a href="login.html" class="hover:text-gold-500 transition">Login</a>`;
                    }
                    if (drawerLink) {
                        drawerLink.innerHTML = `<a href="login.html">Login</a>`;
                    }
                }
            }

            function signOut() {
                localStorage.removeItem('saleor_auth_token');
                localStorage.removeItem('saleor_refresh_token');
                localStorage.removeItem('saleor_csrf_token');
                localStorage.removeItem('saleor_user_email');
                localStorage.removeItem('saleor_user_name');
                window.location.reload();
            }

            document.addEventListener('DOMContentLoaded', checkAuth);

            // Search Logic
            const searchInput = document.getElementById('searchInput');
            const searchDropdown = document.getElementById('searchDropdown');

            // Hide dropdown when clicking outside
            document.addEventListener('click', function (e) {
                if (searchInput && !searchInput.contains(e.target) && searchDropdown && !searchDropdown.contains(e.target)) {
                    searchDropdown.classList.add('hidden');
                }
            });

            if (searchInput) {
                searchInput.addEventListener('input', function (e) {
                    const query = this.value.trim().toLowerCase();
                    
                    // Also trigger the catalogue filtering
                    if (typeof applyFilters === 'function') {
                        applyFilters();
                    }

                    if (query.length === 0) {
                        searchDropdown.classList.add('hidden');
                        return;
                    }

                    if (window.allProducts && window.allProducts.length > 0) {
                        const results = [];

                        window.allProducts.forEach(product => {
                            const productName = product.name.toLowerCase();
                            // १. प्रोडक्ट का नाम चेक करें
                            if (productName.includes(query)) {
                                results.push({
                                    id: product.id,
                                    name: product.name,
                                    thumbnail: product.thumbnail?.url,
                                    price: product.pricing?.priceRange?.start?.gross?.amount,
                                    currency: product.pricing?.priceRange?.start?.gross?.currency
                                });
                            }

                            // २. वेरिएंट्स के नाम चेक करें
                            if (product.variants) {
                                product.variants.forEach(v => {
                                    if (v.name.toLowerCase().includes(query) && !productName.includes(query)) {
                                        results.push({
                                            id: v.id, // वेरिएंट की ID
                                            name: `${v.name}`,
                                            thumbnail: v.media?.[0]?.url || product.thumbnail?.url,
                                            price: v.pricing?.price?.gross?.amount,
                                            currency: v.pricing?.price?.gross?.currency
                                        });
                                    }
                                });
                            }
                        });

                        renderDropdown(results);
                    }
                });
            }

            function renderDropdown(items) {
                if (!searchDropdown) return;
                if (items.length === 0) {
                    searchDropdown.innerHTML = `<div class="p-4 text-center text-gray-500">No products found</div>`;
                    searchDropdown.classList.remove('hidden');
                    return;
                }

                const html = items.map(item => {
                    const price = item.price ? item.price.toFixed(2) : "0.00";
                    const symbol = item.currency === 'INR' ? '₹' : (item.currency || '');
                    const formattedPrice = item.currency === 'INR' ? `₹${price}` : `${price} ${symbol}`;

                    return `
                        <div class="p-3 hover:bg-gray-50 cursor-pointer border-b border-gray-100 last:border-0 flex items-center gap-3"
                             onclick="window.location.href='product.html?id=${item.id}'">
                            <img src="${item.thumbnail || 'images/placeholder.png'}" class="w-12 h-12 object-cover rounded" alt="${item.name}">
                            <div>
                                <h4 class="text-sm font-semibold text-gray-800">${item.name}</h4>
                                <p class="text-xs text-gold-600 font-bold">${formattedPrice}</p>
                            </div>
                        </div>
                    `;
                }).join('');

                searchDropdown.innerHTML = html;
                searchDropdown.classList.remove('hidden');
            }

            // Voice Search Logic
            const voiceBtn = document.getElementById('voiceSearchBtn');
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

            if (SpeechRecognition && voiceBtn && searchInput) {
                const recognition = new SpeechRecognition();
                recognition.lang = 'en-IN';
                recognition.interimResults = false; 
                recognition.maxAlternatives = 1;

                voiceBtn.addEventListener('click', (e) => {
                    e.preventDefault(); 
                    try {
                        recognition.start();
                    } catch (err) {
                        console.log("Recognition already started");
                    }
                });

                recognition.onstart = () => {
                    voiceBtn.classList.add('text-red-500', 'animate-pulse');
                    searchInput.placeholder = "Listening...";
                };

                recognition.onresult = (event) => {
                    const transcript = event.results[0][0].transcript;
                    searchInput.value = transcript;
                    searchInput.dispatchEvent(new Event('input'));
                    voiceBtn.classList.remove('text-red-500', 'animate-pulse');
                };

                recognition.onerror = (event) => {
                    console.error("Speech Error:", event.error);
                    voiceBtn.classList.remove('text-red-500', 'animate-pulse');
                    if (event.error === 'not-allowed') alert("Please allow microphone access");
                };

                recognition.onend = () => {
                    voiceBtn.classList.remove('text-red-500', 'animate-pulse');
                    searchInput.placeholder = "Search products...";
                };
            } else if (voiceBtn) {
                voiceBtn.style.display = 'none';
            }

            // Technician Data
            let technicians = [];

            async function loadTechnicians() {
                const query = `
                query {
                    pages(first: 100) {
                        edges {
                            node {
                                id
                                title
                                slug
                                content
                                attributes {
                                    attribute {
                                        name
                                    }
                                    values {
                                        name
                                    }
                                }
                                metadata {
                                    key
                                    value
                                }
                            }
                        }
                    }
                }
                `;

                try {
                    const res = await fetch("https://api.b-oneinterior.com/graphql/", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ query })
                    });

                    const json = await res.json();
                    const pages = json.data?.pages?.edges || [];
                    // Filter pages that are technicians (you can use slug or a specific attribute)
                    // Based on the image, we have 'electriton' and 'plumber'
                    technicians = pages.map(edge => {
                        const node = edge.node;

                        // Extract metadata from metadata array
                        const phoneMeta = node.metadata.find(m => m.key === "number");
                        const chargeMeta = node.metadata.find(m => m.key === "price");

                        // Parse content JSON to get the name from EditorJS format
                        let techName = node.title;
                        try {
                            const contentData = JSON.parse(node.content);
                            if (contentData.blocks && contentData.blocks.length > 0) {
                                techName = contentData.blocks[0].data.text;
                            }
                        } catch (e) {
                            console.error("Error parsing content JSON", e);
                        }

                        return {
                            category: node.title,
                            name: techName,
                            address: "Mumbai",
                            phone: phoneMeta ? phoneMeta.value : "+917738130131",
                            charge: chargeMeta ? `₹${chargeMeta.value}` : "₹500"
                        };
                    });
                } catch (error) {
                    console.error("Error loading technicians from content:", error);
                }
            }

            function renderTechList(data) {
                const container = document.getElementById('techListContainer');
                if (data.length === 0) {
                    container.innerHTML = `<div class="text-center py-10 text-gray-500">No experts found matching your search.</div>`;
                    return;
                }

                container.innerHTML = data.map(tech => `
                <div class="bg-white p-4 rounded-xl border border-gray-200 shadow-sm hover:border-gold-500 transition">
                    <div class="flex justify-between items-start mb-2">
                        <span class="bg-gold-100 text-gold-700 text-[10px] font-bold px-2 py-1 rounded-full uppercase tracking-wider">${tech.category}</span>
                        <span class="text-gold-600 font-bold">${tech.charge}</span>
                    </div>
                    <h3 class="font-bold text-gray-800 text-lg">${tech.name}</h3>
                    <p class="text-gray-500 text-sm flex items-center gap-1 mb-3">
                        <ion-icon name="location-outline"></ion-icon> ${tech.address}
                    </p>
                    <a href="tel:${tech.phone}" class="flex items-center justify-center gap-2 bg-black text-white py-2 rounded-lg font-bold hover:bg-gold-600 transition">
                        <ion-icon name="call-outline"></ion-icon> Call Now
                    </a>
                </div>
            `).join('');
            }

            function filterTechnicians() {
                const query = document.getElementById('techSearchInput').value.toLowerCase();
                const filtered = technicians.filter(tech =>
                    tech.name.toLowerCase().includes(query) ||
                    tech.category.toLowerCase().includes(query)
                );
                renderTechList(filtered);
            }

            function closeTechModal() {
                document.getElementById('techModal').classList.add('hidden');

            // Technician Voice Search
            function setupTechVoiceSearch() {
                const techVoiceBtn = document.getElementById('techVoiceBtn');
                const techSearchInput = document.getElementById('techSearchInput');
                const TechSpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

                if (TechSpeechRecognition && techVoiceBtn) {
                    const recognition = new TechSpeechRecognition();
                    recognition.lang = 'en-IN';
                    recognition.interimResults = false;
                    recognition.maxAlternatives = 1;

                    techVoiceBtn.onclick = (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                        try {
                            recognition.start();
                        } catch (err) {
                            console.log("Recognition already started");
                        }
                    };

                    recognition.onstart = () => {
                        techVoiceBtn.classList.add('text-red-500', 'animate-pulse');
                        techSearchInput.placeholder = "Listening...";
                    };

                    recognition.onresult = (event) => {
                        const transcript = event.results[0][0].transcript;
                        techSearchInput.value = transcript;
                        filterTechnicians(); // Trigger filtering
                        techVoiceBtn.classList.remove('text-red-500', 'animate-pulse');
                    };

                    recognition.onerror = (event) => {
                        console.error("Speech Error:", event.error);
                        if (event.error === 'not-allowed') alert("Please allow microphone access");
                        techVoiceBtn.classList.remove('text-red-500', 'animate-pulse');
                    };

                    recognition.onend = () => {
                        techVoiceBtn.classList.remove('text-red-500', 'animate-pulse');
                        techSearchInput.placeholder = "Search by name or category...";
                    };
                } else if (techVoiceBtn) {
                    techVoiceBtn.style.display = 'none';
                }
            }

            function openTechModal() {
                document.getElementById('techSearchInput').value = ''; // सर्च रिसेट करें
                (async () => {
                    await loadTechnicians();
                    renderTechList(technicians); // पूरी लिस्ट दिखाएं
                    setupTechVoiceSearch(); // Ensure listeners are attached
                })();
                document.getElementById('techModal').classList.remove('hidden');
            }
        </script>

    <script>
        const API_URL = "https://api.b-oneinterior.com/graphql/";
        const HIDDEN_CATEGORY_NAME = "Gallery Image Category";
        const FALLBACK_IMG = "images/placeholder.png";

        const QUERY = `
query {
  categories(first: 100) { 
    edges { 
      node { 
        id 
        name 
        backgroundImage {
            url
        }
        parent { 
          id 
          name
        } 
          children(first: 100) {
            edges {
              node {
               backgroundImage {
                    url
                }
                id
                name
              }
            }
          }
      } 
    } 
  }
  products(first: 100, channel: "in") { 
    edges { 
      node { 
        id 
        name 
        slug 
        description
        media {
          url
          type
        }
        attributes {
          attribute {
            name
          }
          values {
            name
            file {
              url
            }
          }
        }
        pricing {
            priceRange {
              start {
                gross {
                  amount
                  currency
                }
              }
            }
        }
        category { 
          id 
          name 
          parent { 
            id 
            name 
          } 
        } 
        productType { 
          id 
          name 
        } 
        thumbnail { 
          url 
        } 
        metadata {
          key
          value
        } 
      } 
    } 
  }
}
`;

        let allCategories = [];
        let allProducts = [];
        let selectedParentCategory = null;

        async function fetchSaleor() {
            try {
                const res = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ query: QUERY })
                });
                const json = await res.json();
                if (json.errors) console.error("GraphQL errors:", json.errors);
                return json.data;
            } catch (err) {
                console.error("Fetch error:", err);
                return null;
            }
        }

        function getCatalogueLink(product) {
            // Priority 1: Check Attributes (Legacy)
            if (product.attributes) {
                const catAttr = product.attributes.find(a => a.attribute.name === "Catalogue");
                if (catAttr && catAttr.values && catAttr.values.length > 0) {
                    return catAttr.values[0].file?.url;
                }
            }

            // Priority 2: Check Metadata (catalogue_X)
            if (product.metadata) {
                // Find any key starting with 'catalogue_'
                // We prioritize 'catalogue_1', but will take others if available
                const catalogues = product.metadata
                    .filter(m => m.key.startsWith("catalogue_"))
                    .sort((a, b) => {
                        // sort by number e.g. catalogue_1 before catalogue_2
                        const numA = parseInt(a.key.split('_')[1]) || 0;
                        const numB = parseInt(b.key.split('_')[1]) || 0;
                        return numA - numB;
                    });

                if (catalogues.length > 0) {
                    return catalogues[0].value;
                }
            }

            return null;
        }

        function getParentCategories(categories) {
            return categories.filter(c => !c.parent && c.name !== HIDDEN_CATEGORY_NAME);
        }

        function getSubcategories(categories, parentId) {
            return categories.filter(c => c.parent?.id === parentId);
        }
        function getCategoryIcon(name) {
            const lowerName = name.toLowerCase();
            if (lowerName.includes('wallpaper')) return 'image-outline';
            if (lowerName.includes('plumbing')) return 'water-outline';
            if (lowerName.includes('fitting')) return 'build-outline';
            if (lowerName.includes('electric')) return 'flash-outline';
            if (lowerName.includes('carpentry')) return 'hammer-outline';
            return 'cube-outline';
        }

        function renderCategoryFilters(categories, products) {
            // Get unique category IDs from products with catalogues
            const productCategoryIds = new Set();
            const productParentCategoryIds = new Set();

            products.forEach(p => {
                if (p.category?.id) productCategoryIds.add(p.category.id);
                if (p.category?.parent?.id) productParentCategoryIds.add(p.category.parent.id);
            });
            
            const parentCategories = getParentCategories(categories).filter(c => {
                if (productCategoryIds.has(c.id)) return true;
                if (productParentCategoryIds.has(c.id)) return true;
                const subcats = getSubcategories(categories, c.id);
                return subcats.some(sub => productCategoryIds.has(sub.id));
            });

            let categoriesHtml = "";
            if (parentCategories.length > 0 && parentCategories[0].children) {
                categoriesHtml = parentCategories[0].children.edges.map(c => {
                    const hasImage = c.node.backgroundImage?.url;
                    const isActive = selectedParentCategory === c.node.id;
                    const iconHtml = hasImage
                        ? `<img src="${c.node.backgroundImage.url}" class="w-10 h-10 object-cover rounded-full border ${isActive ? 'border-gold-500 shadow-[0_0_15px_rgba(212,175,55,0.4)]' : 'border-white/10'}" alt="${c.node.name}">`
                        : `<div class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center border ${isActive ? 'border-gold-500 text-gold-500' : 'border-white/10 text-white/40'}">
                             <ion-icon name="${getCategoryIcon(c.node.name)}" class="text-xl"></ion-icon>
                           </div>`;

                    return `
                    <div class="filter-category flex flex-col items-center justify-center cursor-pointer transition-all duration-300 gap-2 group min-w-[70px]" data-category="${c.node.id}">
                        <div class="relative">
                            ${iconHtml}
                            <div class="absolute inset-0 rounded-full bg-gold-500/20 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                        </div>
                        <span class="text-[9px] font-black uppercase tracking-tighter text-center leading-none ${isActive ? 'text-gold-500' : 'text-white/40 group-hover:text-white'} transition-colors">${c.node.name}</span>
                    </div>`;
                }).join("");
            }

            const isAllActive = selectedParentCategory === 'all' || !selectedParentCategory;
            document.getElementById("categoryFilter").innerHTML = `
                <div class="filter-category flex flex-col items-center justify-center cursor-pointer transition-all duration-300 gap-2 group min-w-[70px]" data-category="all">
                    <div class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center border ${isAllActive ? 'border-gold-500 text-gold-500 shadow-[0_0_15px_rgba(212,175,55,0.4)]' : 'border-white/10 text-white/40'}">
                        <ion-icon name="apps-outline" class="text-xl"></ion-icon>
                    </div>
                    <span class="text-[9px] font-black uppercase tracking-tighter text-center leading-none ${isAllActive ? 'text-gold-500' : 'text-white/40 group-hover:text-white'} transition-colors">All</span>
                </div>
                ${categoriesHtml}
            `;
        }

        function getActualPrice(product) {
            if (!product.attributes) return null;
            const priceAttr = product.attributes.find(a => a.attribute.name === "Actual Price");
            if (priceAttr && priceAttr.values && priceAttr.values.length > 0) {
                return priceAttr.values[0].name;
            }
            return null;
        }

        function renderDesktopList(products) {
            const desktopList = document.getElementById("productGrid");

            desktopList.innerHTML = products.length ? products.map(p => {
                const catalogueVal = getCatalogueLink(p); // Raw value (URL or filename)
                const currentPriceObj = p.pricing?.priceRange?.start?.gross;
                const currentPriceVal = currentPriceObj ? currentPriceObj.amount : null;
                const currency = currentPriceObj ? currentPriceObj.currency : "";
                const price = currentPriceVal?.toFixed(2) || "0.00";
                const currSymbol = currency === 'INR' ? '₹' : (currency || '');
                const formattedPrice = currency === 'INR' ? `₹${price}` : `${price} ${currSymbol}`;

                const imageUrl = p.thumbnail?.url || FALLBACK_IMG;

                let buttonHtml = "";
                console.log(products);
                if (catalogueVal) {
                    if (catalogueVal.startsWith("http")) {
                        buttonHtml = `
                            <a href="${catalogueVal}" target="_blank"
                             class="w-full block text-center bg-gray-200 text-black text-[10px] font-black uppercase tracking-widest px-3 py-2.5 rounded-xl shadow hover:bg-gray-300 transition cursor-pointer">
                             Download
                            </a>`;
                    } else {
                        buttonHtml = `
                            <button onclick="openCatalogueViewer('${catalogueVal}')"
                             class="w-full block text-center gold-gradient-bg text-black text-[10px] font-black uppercase tracking-widest px-3 py-2.5 rounded-xl shadow hover:opacity-90 transition cursor-pointer">
                             View Catalogue
                            </button>`;
                    }
                }

                return `
                <div class="creative-card flex flex-col group h-full">
                    <div onclick="window.location.href='product.html?id=${p.id}'" class="relative overflow-hidden aspect-[4/5] cursor-pointer">
                        <img src="${imageUrl}" class="w-full h-full object-cover transition duration-700 group-hover:scale-110" alt="${p.name}">
                        ${p.category?.name ? `<div class="absolute bottom-2 left-2 bg-black/60 backdrop-blur-md text-white text-[8px] font-black px-2 py-1 rounded-md uppercase tracking-wider z-10 border border-white/10">${p.category.name}</div>` : ''}
                        <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center pointer-events-none">
                            <span class="gold-gradient-bg text-black px-4 py-1.5 rounded-full text-[9px] font-black uppercase tracking-wider">View Details</span>
                        </div>
                    </div>
                    
                    <div class="p-4 flex flex-col flex-grow bg-black/20">
                        <h3 class="font-black text-white text-xs uppercase tracking-tight line-clamp-2 mb-3 group-hover:text-gold-500 transition leading-tight">${p.name}</h3>
                        <div class="mt-auto pt-3 border-t border-white/5 space-y-3">
                            <div class="flex flex-col">
                                <span class="text-[8px] text-white/40 uppercase font-bold tracking-widest">Starting from</span>
                                <span class="gold-gradient-text text-base font-black">${formattedPrice}</span>
                            </div>
                            ${buttonHtml}
                        </div>
                    </div>
                </div>
            `;
            }).join("") : `<div class="col-span-full py-20 text-center text-gray-500 font-bold uppercase tracking-widest">No catalogues found</div>`;
        }

        function renderMobileList(products) {
            // We'll use the same grid for mobile now, so just call desktop list
            renderDesktopList(products);
        }

        function applyFilters() {
            let filtered = window.allProducts || [];

            // Filter by Search Query
            const searchInput = document.getElementById("searchInput");
            const searchQuery = searchInput ? searchInput.value.toLowerCase() : "";
            if (searchQuery) {
                filtered = filtered.filter(p =>
                    p.name.toLowerCase().includes(searchQuery) ||
                    (p.category && p.category.name.toLowerCase().includes(searchQuery)) ||
                    (p.description && p.description.toLowerCase().includes(searchQuery))
                );
            }

            if (selectedParentCategory && selectedParentCategory !== "all") {
                const subcategories = getSubcategories(allCategories, selectedParentCategory);
                const subcatIds = subcategories.map(s => s.id);

                filtered = filtered.filter(p =>
                    p.category?.id === selectedParentCategory || subcatIds.includes(p.category?.id)
                );
            }

            if (window.innerWidth >= 768) {
                renderDesktopList(filtered);
            } else {
                renderMobileList(filtered);
            }
        }

        function setupFiltering() {
            // Search Input Listener
            const searchInput = document.getElementById("searchInput");
            if (searchInput) {
                searchInput.addEventListener("input", () => {
                    applyFilters();
                });
            }

            document.addEventListener("click", e => {
                if (e.target.closest(".filter-category")) {
                    const target = e.target.closest(".filter-category");
                    document.querySelectorAll(".filter-category").forEach(b => {
                        b.classList.remove("text-gold");
                        b.classList.add("text-gray-500");
                    });
                    target.classList.remove("text-gray-500");
                    target.classList.add("text-gold");

                    selectedParentCategory = target.dataset.category;
                    applyFilters();
                }
            });
        }

        function updateCartBadge() {
            const badge = document.getElementById("cartCountBadge");
            if (!badge) return; // Badge element may not exist

            const list = JSON.parse(localStorage.getItem("inquiryList") || "[]");
            const count = list.length;

            if (count > 0) {
                badge.textContent = count;
                badge.classList.remove("hidden");
            } else {
                badge.classList.add("hidden");
            }
        }

        (async () => {
            const data = await fetchSaleor();
            if (!data) {
                document.getElementById("loadingSpinner").classList.add("hidden");
                return alert("Error fetching Saleor API");
            }
            allCategories = data.categories?.edges?.map(e => e.node) || [];
            let products = data.products?.edges?.map(e => e.node) || [];
            
            // Find the "catalogue" category and all its subcategories
            const catalogueCategory = allCategories.find(c => c.name?.toLowerCase() === "catalogue");
            const catalogueCategoryId = catalogueCategory?.id;
            const catalogueSubcategoryIds = catalogueCategoryId
                ? allCategories.filter(c => c.parent?.id === catalogueCategoryId).map(c => c.id)
                : [];
            
            // Find the hidden category and all its subcategories
            const hiddenCategory = allCategories.find(c => c.name === HIDDEN_CATEGORY_NAME);
            const hiddenCategoryId = hiddenCategory?.id;
            const hiddenSubcategoryIds = hiddenCategoryId
                ? allCategories.filter(c => c.parent?.id === hiddenCategoryId).map(c => c.id)
                : [];
            
            // Filter: only products with catalogue AND (category name === "catalogue" OR parent is catalogue) AND not in hidden category
            window.allProducts = products.filter(p => {
                // const hasCatalogue = getCatalogueLink(p) !== null;
                // if (!hasCatalogue) return false;

                const categoryId = p.category?.id;
                const categoryName = p.category?.name?.toLowerCase();
                const parentCategoryId = p.category?.parent?.id;
                const parentCategoryName = p.category?.parent?.name?.toLowerCase();

                // Check if product belongs to catalogue category or its subcategories
                const isCatalogueCategory = categoryName === "catalogue";
                const isCatalogueSubcategory = catalogueSubcategoryIds.includes(categoryId);
                const hasCatalogueParent = parentCategoryName === "catalogue" || parentCategoryId === catalogueCategoryId;
                
                if (!isCatalogueCategory && !isCatalogueSubcategory && !hasCatalogueParent) return false;

                // Exclude hidden categories
                if (categoryId === hiddenCategoryId) return false;
                if (hiddenSubcategoryIds.includes(categoryId)) return false;
                if (parentCategoryId === hiddenCategoryId) return false;

                return true;
            });
            renderCategoryFilters(allCategories, window.allProducts);
            applyFilters();
            setupFiltering();
            updateCartBadge();
            document.getElementById("loadingSpinner").classList.add("hidden");
        })();
    </script>

    <!-- PDF.js Logic -->
    <script type="module">
        import * as pdfjsLib from 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.0.379/build/pdf.min.mjs';
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.0.379/build/pdf.worker.min.mjs';

        let pdfDoc = null; // Represents the CURRENT page's PDF document
        let currentPage = 1;
        let totalPages = 1;
        let isRendering = false;
        let pageNumPending = null;
        let currentFilename = "";

        // Caching blobs to avoid re-fetching pages

        const pageBlobCache = new Map(); // Key: "filename_page" -> Blob URL
        let zoomLevel = 1.0;

        // Pan State
        let isDragging = false;
        let startX, startY, scrollLeft, scrollTop;

        window.openCatalogueViewer = async function (filename) {
            const nameWithoutExt = filename.replace(/\.[^/.]+$/, "").trim();
            currentFilename = nameWithoutExt;
            currentPage = 1;
            zoomLevel = 1.0;
            pageBlobCache.clear();

            const modal = document.getElementById("catalogueModal");
            modal.classList.remove("hidden");
            modal.classList.add("flex");

            // Setup Pan Events
            const container = document.getElementById("catalogueViewer");
            container.innerHTML = `
                 <div id="catalogueLoader" class="absolute inset-0 flex items-center justify-center bg-black/50 z-10 hidden rounded-lg">
                     <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-gold"></div>
                 </div>
            `;

            // Attach mouse events for panning
            container.onmousedown = (e) => {
                isDragging = true;
                container.classList.add('active');
                startX = e.pageX - container.offsetLeft;
                startY = e.pageY - container.offsetTop;
                scrollLeft = container.scrollLeft;
                scrollTop = container.scrollTop;
            };

            container.onmouseleave = () => {
                isDragging = false;
                container.classList.remove('active');
            };

            container.onmouseup = () => {
                isDragging = false;
                container.classList.remove('active');
            };

            container.onmousemove = (e) => {
                if (!isDragging) return;
                e.preventDefault();
                const x = e.pageX - container.offsetLeft;
                const y = e.pageY - container.offsetTop;
                const walkX = (x - startX) * 2;
                const walkY = (y - startY) * 2;
                container.scrollLeft = scrollLeft - walkX;
                container.scrollTop = scrollTop - walkY;
            };

            await fetchPageCount();
            await loadPageDocument(1);
        };

        window.updateZoom = function (delta) {
            const newZoom = zoomLevel + delta;
            if (newZoom >= 0.5 && newZoom <= 3.0) {
                zoomLevel = newZoom;
                if (currentFilename && currentPage) {
                    loadPageDocument(currentPage);
                }
            }
        };

        window.resetZoom = function () {
            zoomLevel = 1.0;
            if (currentFilename && currentPage) {
                loadPageDocument(currentPage);
            }
        };

        window.closeCatalogue = function () {
            document.getElementById("catalogueModal").classList.add("hidden");
            document.getElementById("catalogueModal").classList.remove("flex");
            zoomLevel = 1.0;
        };

        window.changePage = function (delta) {
            const next = currentPage + delta;
            if (next >= 1 && next <= totalPages) {
                currentPage = next;
                loadPageDocument(next);
            }
        };

        async function fetchPageCount() {
            const encodedName = encodeURIComponent(currentFilename);
            try {
                const res = await fetch(`https://pdf-serve.themanagemate.com/list-pdfs/${encodedName}`);
                if (!res.ok) throw new Error("Failed to list PDF info");
                const json = await res.json();
                if (json && json.length > 0) {
                    totalPages = json[0].pageCount || 1;
                } else {
                    totalPages = 1;
                }
            } catch (e) {
                console.error("Error fetching page count:", e);
                totalPages = 1;
            }
            updateUI(currentPage);
        }

        async function loadPageDocument(pageNum) {
            const loader = document.getElementById("catalogueLoader");
            loader.classList.remove("hidden");

            const cacheKey = `${currentFilename}_${pageNum}`;
            let url = "";

            try {
                if (pageBlobCache.has(cacheKey)) {
                    url = pageBlobCache.get(cacheKey);
                } else {
                    const encodedName = encodeURIComponent(currentFilename);
                    const fetchUrl = `https://pdf-serve.themanagemate.com/fetch-page/${encodedName}/${pageNum}`;
                    const res = await fetch(fetchUrl);
                    if (!res.ok) throw new Error("Failed to fetch page");
                    const blob = await res.blob();
                    url = URL.createObjectURL(blob);
                    pageBlobCache.set(cacheKey, url);
                }

                const loadingTask = pdfjsLib.getDocument(url);
                const pdf = await loadingTask.promise;

                await renderPageToCanvas(pdf, 1, pageNum);

                updateUI(pageNum);

            } catch (error) {
                console.error("Error loading PDF page:", error);
            } finally {
                loader.classList.add("hidden");
            }
        }

        async function renderPageToCanvas(pdf, pdfPageIndex, globalPageNum) {
            const page = await pdf.getPage(pdfPageIndex);

            // Create Canvas
            const canvas = document.createElement("canvas");
            canvas.className = "shadow-2xl rounded-lg max-h-full max-w-full object-contain";

            const container = document.getElementById("catalogueViewer");
            // Clear content but keep loader
            const loader = document.getElementById("catalogueLoader");
            container.innerHTML = "";
            container.appendChild(loader);
            container.appendChild(canvas);

            const ctx = canvas.getContext('2d');
            const viewport = page.getViewport({ scale: 1 });

            // Scale: Fit to container height (Single Page) * zoomLevel
            const containerWidth = container.clientWidth || window.innerWidth * 0.8;
            const containerHeight = container.clientHeight || window.innerHeight * 0.8;

            const hScale = containerHeight / viewport.height;
            const wScale = containerWidth / viewport.width;

            // Base scale is "Fit Within"
            let finalScale = Math.min(hScale, wScale);

            // Apply User Zoom
            finalScale = finalScale * zoomLevel;

            const scaledViewport = page.getViewport({ scale: finalScale });

            canvas.height = scaledViewport.height;
            canvas.width = scaledViewport.width;

            // Enforce overflow behavior on container
            if (zoomLevel > 1.0) {
                container.classList.remove('overflow-hidden');
                container.classList.add('overflow-auto');
                container.style.justifyContent = 'flex-start'; // Allow scrolling
                container.style.alignItems = 'flex-start';
            } else {
                container.classList.add('overflow-hidden');
                container.classList.remove('overflow-auto');
                container.style.justifyContent = 'center'; // Center it
                container.style.alignItems = 'center';
            }

            // CSS to make it responsive but respect zoom
            canvas.style.maxWidth = "none"; // Allow exceeding container width for zoom

            const renderContext = {
                canvasContext: ctx,
                viewport: scaledViewport
            };

            await page.render(renderContext).promise;
        }

        function updateUI(pageNum) {
            const prevBtn = document.getElementById("catPrevBtn");
            const nextBtn = document.getElementById("catNextBtn");

            if (prevBtn) {
                prevBtn.disabled = pageNum <= 1;
                // If disabled, hide interaction
                if (pageNum <= 1) {
                    prevBtn.classList.add("opacity-0", "pointer-events-none");
                } else {
                    prevBtn.classList.remove("opacity-0", "pointer-events-none");
                }
            }

            if (nextBtn) {
                nextBtn.disabled = pageNum >= totalPages;
                if (pageNum >= totalPages) {
                    nextBtn.classList.add("opacity-0", "pointer-events-none");
                } else {
                    nextBtn.classList.remove("opacity-0", "pointer-events-none");
                }
            }

            currentPage = pageNum;
        }
    </script>
