<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Category Search - B-One Interior</title>
    <script src="assets/js/tailwind.min.js"></script>
    <script type="module" src="assets/js/ionicons/ionicons.esm.js"></script>
    <link rel="stylesheet" href="style.css?v=1.1">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'gold': {
                            300: '#F4E5C2', 400: '#E8D4A0', 500: '#D4AF37', 600: '#C5A028', 700: '#B8941F'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #0a0a0a; }
        .gold-gradient-text {
            background: linear-gradient(135deg, #D4AF37 0%, #F5E6A3 50%, #D4AF37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .gold-gradient-bg {
            background: linear-gradient(135deg, #D4AF37 0%, #F5E6A3 50%, #D4AF37 100%) !important;
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-black overflow-x-hidden w-full">

    <!-- Header -->
    <header class="bg-black shadow-lg sticky top-0 z-50 border-b border-gold-700">

        <!-- Mobile Top Bar (same as home + back icon) -->
        <div class="md:hidden fixed top-0 left-0 right-0 z-[70] px-4 py-2 border-b border-gold-500/10 bg-black/95 backdrop-blur-sm">
            <div class="flex items-center gap-3 min-h-[48px]">
                <a href="https://b-oneinterior.com/" aria-label="Back to home"
                    class="flex items-center justify-center w-10 h-10 rounded-xl border border-gold-500/30 text-gold-500 hover:bg-gold-500/10 transition flex-shrink-0">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </a>
                <div class="relative flex-1">
                    <input type="text" id="catSearchInput" placeholder="Search products..."
                        class="w-full pl-10 pr-10 py-2.5 bg-black/60 border border-gold-500/30 rounded-xl text-white text-sm focus:outline-none focus:border-gold-500"
                        oninput="filterProducts(this.value)">
                    <div class="absolute left-3 top-1/2 -translate-y-1/2 text-gold-500 pointer-events-none">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                    </div>
                </div>
            </div>
        </div>
        <div class="md:hidden h-[65px]"></div>

        <!-- Desktop Nav -->
        <nav class="container mx-auto px-4 py-4 hidden md:flex items-center justify-between">
            <div class="text-2xl font-bold text-gold-500"><a href="https://b-oneinterior.com/"><img src="logo.png" style="height: 8vh;" alt="B-One Interior"></a></div>
            <ul class="hidden md:flex space-x-6 text-gray-300 items-center">
                <li><a href="https://b-oneinterior.com/" class="hover:text-gold-500 transition">Home</a></li>
                <li><a href="https://b-oneinterior.com/catalogue" class="hover:text-gold-500 transition">Catalogue</a></li>
                <li><a href="https://b-oneinterior.com/gallery" class="hover:text-gold-500 transition">Gallery</a></li>
                <li><a href="https://b-oneinterior.com/cart" class="hover:text-gold-500 transition">Cart</a></li>
            </ul>
        </nav>

        <div id="drawer">
            <ul>
                <li><a href="https://b-oneinterior.com">Home</a></li>
                <li><a href="https://b-oneinterior.com/catalogue">Catalogue</a></li>
                <li><a href="https://b-oneinterior.com/gallery">Gallery</a></li>
                <li><a href="https://b-oneinterior.com/cart">Cart</a></li>
                <li><a href="https://b-oneinterior.com/#contact">Contact Us</a></li>
            </ul>
        </div>
        <label class="overlay"></label>
    </header>

    <main class="container mx-auto px-4 pb-8 mb-24">
        <div class="py-4">
            <h1 id="categoryTitleDesktop" class="text-2xl md:text-4xl font-black gold-gradient-text uppercase tracking-widest mb-4 hidden md:block">Category</h1>

            <!-- Price Filter -->
            <div class="flex items-center gap-2 mb-3">
                Enter Budget
                <input type="number" id="priceMin" placeholder="Min ₹" min="0"
                    class="w-28 bg-black/60 border border-gold-500/30 rounded-xl px-3 py-2 text-white text-sm focus:outline-none focus:border-gold-500 placeholder:text-gray-600"
                    oninput="applyPriceFilter()">
                <span class="text-gray-500 text-xs">to</span>
                <input type="number" id="priceMax" placeholder="Max ₹" min="0"
                    class="w-28 bg-black/60 border border-gold-500/30 rounded-xl px-3 py-2 text-white text-sm focus:outline-none focus:border-gold-500 placeholder:text-gray-600"
                    oninput="applyPriceFilter()">
                <button onclick="clearPriceFilter()"
                    class="text-[10px] font-bold uppercase tracking-wider text-gold-500 hover:text-gold-400 transition px-2">
                    Clear
                </button>
            </div>

            <!-- Sub-category horizontal scroll -->
            <div id="subcategoryScroll" class="overflow-x-auto pb-2 hide-scrollbar">
                <div id="subcategoryInner" class="flex gap-2 px-1" style="width:max-content">
                    <!-- Sub-category blocks rendered here -->
                </div>
            </div>

            <div id="loadingSpinner" class="flex justify-center py-20">
                <svg class="w-10 h-10 animate-spin text-gold-500" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
            </div>
            <div id="errorMessage" class="hidden text-center py-20">
                <p class="text-gray-500 text-lg">Failed to load categories. Please try again.</p>
                <button onclick="loadCategory()" class="mt-4 gold-gradient-bg text-black font-bold px-6 py-2 rounded-xl">Retry</button>
            </div>

            <div id="productSection" class="hidden mt-6">
                <div class="flex items-center justify-between mb-4">
                    <h2 id="activeSubName" class="text-lg md:text-2xl font-black gold-gradient-text uppercase tracking-widest"></h2>
                    <span id="productCount" class="text-gray-500 text-sm"></span>
                </div>
                <div id="productGrid" class="grid grid-cols-2 md:grid-cols-4 xl:grid-cols-5 gap-3 md:gap-6">
                </div>
                <div id="productLoader" class="hidden flex justify-center py-10">
                    <svg class="w-8 h-8 animate-spin text-gold-500" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
                </div>
                <div id="productEmpty" class="hidden text-center py-10">
                    <p class="text-gray-500">No products found in this sub-category.</p>
                </div>
            </div>
        </div>
    </main>

    <div class="fixedBottom" style="box-sizing: border-box; width: 100%; max-width: 100vw;">
        <a href="https://b-oneinterior.com/" class="logoBx"></a>
        <ul>
            <li class="relative">
                <a href="profile.html" class="flex flex-col items-center justify-center gap-1 transition-all active:scale-90">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                    <div class="text-[12px] tracking-tighter">Account</div>
                </a>
            </li>
            <li class="relative">
                <a href="https://b-oneinterior.com/wishlist" class="flex flex-col items-center justify-center gap-1 transition-all active:scale-90">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                    <div class="text-[12px] tracking-tighter">Wishlist</div>
                    <span class="wishlist-badge absolute -top-1 right-2 bg-gold text-black text-[9px] font-black w-4 h-4 flex items-center justify-center rounded-full shadow-lg border border-black/20" style="display:none;"></span>
                </a>
            </li>
            <li class="mt-7 active:scale-90 font-black tracking-tighter underline text-gold-500"> Home</li>
            <li class="relative">
                <a id="mobileCartLink" href="https://b-oneinterior.com/cart" class="flex flex-col items-center justify-center gap-1 transition-all active:scale-90">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-gold"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
                    <div class="text-[12px] tracking-tighter">Cart</div>
                    <span id="cartCountBadge" class="absolute -top-1 right-2 bg-gold text-black text-[9px] font-black w-4 h-4 flex items-center justify-center rounded-full shadow-lg border border-black/20 hidden"></span>
                </a>
            </li>
            <li>
                <a href="#" onclick="toggleDrawer(); return false;" class="flex flex-col items-center justify-center gap-1 transition-all active:scale-90">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6H21"/><path d="M3 12H21"/><path d="M3 18H21"/></svg>
                    <div class="text-[12px] tracking-tighter">Menu</div>
                </a>
            </li>
        </ul>
    </div>

    <script>
        const API_URL = "https://api.b-oneinterior.com/graphql/";
        let allSubCategories = [];
        let selectedSubCategoryId = null;
        let allProducts = [];
        let allCatProducts = [];

        function getUrlParam(name) {
            return new URLSearchParams(window.location.search).get(name);
        }

        function toggleDrawer() {
            const drawer = document.getElementById("drawer");
            const overlay = document.querySelector(".overlay");
            if (drawer.style.left === "0px") {
                drawer.style.left = "-250px";
                overlay.style.opacity = "0";
                overlay.style.pointerEvents = "none";
            } else {
                drawer.style.left = "0px";
                overlay.style.opacity = "1";
                overlay.style.pointerEvents = "auto";
            }
        }

        const overlay = document.querySelector(".overlay");
        if (overlay) {
            overlay.addEventListener("click", () => {
                document.getElementById("drawer").style.left = "-250px";
                overlay.style.opacity = "0";
                overlay.style.pointerEvents = "none";
            });
        }

        async function apiCall(query, variables = {}) {
            let token = localStorage.getItem('saleor_auth_token');
            const headers = { 'Content-Type': 'application/json' };
            if (token) headers['Authorization'] = `Bearer ${token}`;

            const doFetch = async () => {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers,
                    body: JSON.stringify({ query, variables })
                });
                return res.json();
            };

            let json = await doFetch();

            if (json.errors && json.errors.some(e =>
                e.message?.toLowerCase().includes('signature has expired') ||
                e.message?.toLowerCase().includes('expired')
            )) {
                const rt = localStorage.getItem('saleor_refresh_token');
                if (rt) {
                    const refreshRes = await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            query: `mutation { tokenRefresh(refreshToken: "${rt}") { token errors { field message } } }`
                        })
                    });
                    const refreshJson = await refreshRes.json();
                    if (refreshJson.data?.tokenRefresh?.token) {
                        localStorage.setItem('saleor_auth_token', refreshJson.data.tokenRefresh.token);
                        headers['Authorization'] = `Bearer ${refreshJson.data.tokenRefresh.token}`;
                        json = await doFetch();
                    }
                }
            }

            return json;
        }

        async function loadCategory() {
            const catId = getUrlParam('catId');
            if (!catId) {
                document.getElementById('loadingSpinner').classList.add('hidden');
                document.getElementById('errorMessage').classList.remove('hidden');
                document.getElementById('errorMessage').querySelector('p').textContent = 'No category specified.';
                return;
            }

            document.getElementById('loadingSpinner').classList.remove('hidden');
            document.getElementById('errorMessage').classList.add('hidden');

            try {
                const query = `
                    query {
                        category(id: "${catId}") {
                            id name backgroundImage { url }
                            children(first: 100) {
                                edges {
                                    node {
                                        id name
                                        backgroundImage { url alt }
                                        parent { id name }
                                    }
                                }
                            }
                        }
                    }
                `;

                const result = await apiCall(query);
                const category = result.data?.category;

                if (!category) {
                    document.getElementById('loadingSpinner').classList.add('hidden');
                    document.getElementById('errorMessage').classList.remove('hidden');
                    return;
                }

                const categoryName = category.name || 'Category';
                document.getElementById('categoryTitleDesktop').textContent = categoryName;

                allSubCategories = (category.children?.edges || []).map(e => e.node);

                document.getElementById('loadingSpinner').classList.add('hidden');

                if (allSubCategories.length === 0) {
                    document.getElementById('subcategoryInner').innerHTML = `
                        <div class="text-gray-500 text-center py-10 w-full">No sub-categories found.</div>
                    `;
                    return;
                }

                renderSubCategories();
                selectSubCategory(allSubCategories[0].id);

            } catch (err) {
                console.error('Failed to load category:', err);
                document.getElementById('loadingSpinner').classList.add('hidden');
                document.getElementById('errorMessage').classList.remove('hidden');
            }
        }

        function renderSubCategories() {
            const inner = document.getElementById('subcategoryInner');

            inner.innerHTML = allSubCategories.map(s => `
                <div onclick="selectSubCategory('${s.id}')"
                    class="sub-cat-item group flex flex-col items-center cursor-pointer transition-all ${selectedSubCategoryId === s.id ? 'opacity-100 scale-100' : 'hover:opacity-100'}"
                    data-id="${s.id}">
                    <div class="w-14 h-14 rounded-2xl bg-white/5 overflow-hidden border ${selectedSubCategoryId === s.id ? 'border-gold-500' : 'border-gold-500/20'} group-hover:border-gold-500 transition-colors flex items-center justify-center">
                        ${s.backgroundImage?.url
                            ? `<img src="${s.backgroundImage.url}" class="w-full h-full object-cover" alt="${s.name}">`
                            : `<ion-icon name="cube-outline" class="text-2xl text-gold-500"></ion-icon>`
                        }
                    </div>
                    <span class="text-[9px] font-bold text-white mt-1.5 uppercase tracking-tighter w-14 text-center ${selectedSubCategoryId === s.id ? 'underline underline-offset-4' : ''}">${s.name}</span>
                </div>
            `).join('');
        }

        function selectSubCategory(subId) {
            selectedSubCategoryId = subId;
            renderSubCategories();

            const sub = allSubCategories.find(s => s.id === subId);
            const name = sub ? sub.name : 'Products';
            document.getElementById('activeSubName').textContent = name;
            document.getElementById('productSection').classList.remove('hidden');
            document.getElementById('productGrid').innerHTML = '';
            document.getElementById('productEmpty').classList.add('hidden');
            document.getElementById('catSearchInput').value = '';

            loadProducts(subId);
        }

        async function loadProducts(categoryId) {
            document.getElementById('productLoader').classList.remove('hidden');

            try {
                const query = `
                    query {
                        products(first: 50, channel: "in", filter: { isPublished: true, categories: ["${categoryId}"] }, sortBy: { field: CREATED_AT, direction: DESC }) {
                            edges {
                                node {
                                    id name slug
                                    thumbnail { url }
                                    media { url type }
                                    category { id name }
                                    pricing { priceRange { start { gross { amount currency } } stop { gross { amount currency } } } }
                                    attributes { attribute { name } values { name file { url } } }
                                    variants { id name quantityAvailable media { url type } pricing { price { gross { amount currency } } } }
                                }
                            }
                        }
                    }
                `;

                const result = await apiCall(query);
                const edges = result.data?.products?.edges || [];

                document.getElementById('productLoader').classList.add('hidden');

                allCatProducts = edges.map(e => e.node);

                if (allCatProducts.length === 0) {
                    document.getElementById('productEmpty').classList.remove('hidden');
                    document.getElementById('productCount').textContent = '';
                    return;
                }

                document.getElementById('productCount').textContent = `${allCatProducts.length} product(s)`;
                renderProducts(allCatProducts);

            } catch (err) {
                console.error('Failed to load products:', err);
                document.getElementById('productLoader').classList.add('hidden');
                document.getElementById('productEmpty').classList.remove('hidden');
                document.getElementById('productEmpty').querySelector('p').textContent = 'Failed to load products.';
            }
        }

        function renderProducts(products) {
            const grid = document.getElementById('productGrid');

            if (products.length === 0) {
                document.getElementById('productEmpty').classList.remove('hidden');
                document.getElementById('productCount').textContent = '';
                grid.innerHTML = '';
                return;
            }

            document.getElementById('productEmpty').classList.add('hidden');
            grid.innerHTML = products.map(p => renderProductCard(p)).join('');
        }

        function filterProducts(query) {
            const q = query.toLowerCase().trim();
            if (!q) {
                renderProducts(allCatProducts);
                document.getElementById('productCount').textContent = `${allCatProducts.length} product(s)`;
                applyPriceFilter();
                return;
            }
            const filtered = allCatProducts.filter(p =>
                p.name.toLowerCase().includes(q)
            );
            renderProducts(filtered);
            document.getElementById('productCount').textContent = `${filtered.length} of ${allCatProducts.length} product(s)`;
        }

        function applyPriceFilter() {
            const min = parseFloat(document.getElementById('priceMin').value) || 0;
            const max = parseFloat(document.getElementById('priceMax').value) || Infinity;
            const searchQ = document.getElementById('catSearchInput').value.trim().toLowerCase();

            let filtered = allCatProducts;
            if (searchQ) {
                filtered = filtered.filter(p => p.name.toLowerCase().includes(searchQ));
            }
            filtered = filtered.filter(p => {
                const price = p.pricing?.priceRange?.start?.gross?.amount || 0;
                return price >= min && price <= max;
            });

            renderProducts(filtered);
            document.getElementById('productCount').textContent = `${filtered.length} of ${allCatProducts.length} product(s)`;
        }

        function clearPriceFilter() {
            document.getElementById('priceMin').value = '';
            document.getElementById('priceMax').value = '';
            applyPriceFilter();
        }

        function renderProductCard(p) {
            const imgUrl = p.thumbnail?.url || p.media?.[0]?.url || '';
            const price = p.pricing?.priceRange?.start?.gross;
            const priceStr = price ? `₹${price.amount.toLocaleString('en-IN')}` : '';
            const linkUrl = `product.html?id=${encodeURIComponent(p.id)}&slug=${encodeURIComponent(p.slug || '')}`;
            const catName = p.category?.name || '';

            return `
                <div onclick="window.location.href='${linkUrl}'"
                    class="creative-card1 flex flex-col group cursor-pointer h-full relative bg-white/5 rounded-2xl overflow-hidden border border-gold-500/10 hover:border-gold-500/50 transition-all active:scale-[0.98]">
                    <div class="relative overflow-hidden aspect-square bg-black/40">
                        ${imgUrl
                            ? `<img src="${imgUrl}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" alt="${p.name}">`
                            : `<div class="w-full h-full flex items-center justify-center"><ion-icon name="cube-outline" class="text-5xl text-gray-600"></ion-icon></div>`
                        }
                        <div class="absolute inset-0 bg-black/30 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center pointer-events-none">
                            <span class="gold-gradient-bg text-black px-4 py-1.5 rounded-full text-[9px] font-black uppercase tracking-wider">View Details</span>
                        </div>
                    </div>
                    <div class="p-3 flex flex-col flex-grow">
                        ${catName ? `<span class="gold-gradient-text text-[9px] font-black uppercase tracking-widest mb-1">${catName}</span>` : ''}
                        <h3 class="font-bold text-white text-xs lg:text-sm line-clamp-2 mb-2 group-hover:text-gold-500 transition leading-tight">${p.name}</h3>
                        ${priceStr ? `<div class="mt-auto"><span class="text-gold-500 font-black text-sm">${priceStr}</span></div>` : ''}
                    </div>
                </div>
            `;
        }

        function refreshCartBadge() {
            const count = JSON.parse(localStorage.getItem('inquiryList') || '[]').length;
            const el = document.getElementById('cartCountBadge');
            if (el) {
                el.textContent = count;
                el.style.display = count > 0 ? 'flex' : 'none';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadCategory();
            refreshCartBadge();
        });
    </script>
</body>
</html>
