            function toggleDrawer() {

            function closeMobileDrawer() {
                document.getElementById("drawer").style.left = "-250px";
                document.querySelector(".overlay").style.opacity = "0";
                document.querySelector(".overlay").style.pointerEvents = "none";
            }
            document.querySelector(".overlay").addEventListener("click", closeMobileDrawer);

            function checkAuth() {
                const token = localStorage.getItem('saleor_auth_token');
                const userEmail = localStorage.getItem('saleor_user_email');
                const dLink = document.getElementById('authLinkDesktop');
                const drLink = document.getElementById('authLinkDrawer');
                if (token && userEmail) {
                    if (dLink) dLink.innerHTML = `<a href="#" onclick="signOut()" class="text-[10px] font-black uppercase border border-gold/30 px-3 py-1.5 rounded-lg hover:bg-gold hover:text-black transition">Sign Out</a>`;
                    if (drLink) drLink.innerHTML = `<a href="#" onclick="signOut()">Sign Out (${userEmail})</a>`;
                } else {
                    if (dLink) dLink.innerHTML = `<a href="login.html" class="hover:text-gold-500 transition">Login</a>`;
                    if (drLink) drLink.innerHTML = `<a href="login.html">Login</a>`;
                }
            }
            function signOut() {
                localStorage.removeItem('saleor_auth_token'); localStorage.removeItem('saleor_refresh_token'); localStorage.removeItem('saleor_csrf_token');
                localStorage.removeItem('saleor_user_email'); localStorage.removeItem('saleor_user_name'); window.location.reload();
            }
            document.addEventListener('DOMContentLoaded', checkAuth);

            function updateWishlistBadge() {
                const b = document.querySelector('.wishlist-badge');
                if (!b) return;
                const w = JSON.parse(localStorage.getItem("wishlist") || "{}");
                let t = 0; Object.values(w).forEach(i => t += i.length);
                if (t > 0) { b.textContent = t; b.style.display = 'flex'; } else { b.style.display = 'none'; }
            }
            updateWishlistBadge();

            let technicians = [];
            async function loadTechnicians() {
                const query = `query { pages(first: 100) { edges { node { id title content metadata } } } }`;
                try {
                    const res = await fetch("https://api.b-oneinterior.com/graphql/", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ query }) });
                    const json = await res.json();
                    technicians = (json.data?.pages?.edges || []).map(edge => {
                        const n = edge.node;
                        const p = n.metadata.find(m => m.key === "number")?.value || "+917738130131";
                        const c = n.metadata.find(m => m.key === "price")?.value || "500";
                        let name = n.title;
                        try { const cd = JSON.parse(n.content); if (cd.blocks?.[0]?.data?.text) name = cd.blocks[0].data.text; } catch (e) { }
                        return { category: n.title, name, address: "Mumbai", phone: p, charge: "₹" + c };
                    });
                } catch (e) { console.error(e); }
            }
            function renderTechList(data) {
                const c = document.getElementById('techListContainer'); if (!c) return;
                if (data.length === 0) { c.innerHTML = `<p class="text-center py-10 text-gray-400 font-bold uppercase text-[10px]">No Experts Found</p>`; return; }
                c.innerHTML = data.map(t => `
                <div class="bg-black/40 p-5 rounded-2xl border border-white/10 hover:border-gold/50 transition group">
                    <div class="flex justify-between items-start mb-3">
                        <span class="bg-gold/10 text-gold text-[9px] font-black px-2 py-1 rounded-md uppercase border border-gold/20">${t.category}</span>
                        <span class="text-gold font-black">${t.charge}</span>
                    </div>
                    <h3 class="font-black text-white text-lg uppercase tracking-tight mb-1 group-hover:text-gold transition">${t.name}</h3>
                    <p class="text-white/80 text-[10px] font-bold flex items-center gap-1 mb-4 uppercase"><ion-icon name="location-outline"></ion-icon> Mumbai</p>
                    <a href="tel:${t.phone}" class="flex items-center justify-center gap-2 gold-gradient-bg text-black py-3 rounded-xl font-black uppercase text-[10px] tracking-widest hover:opacity-90 shadow-xl">
                        <ion-icon name="call" class="text-lg"></ion-icon> Call Expert
                    </a>
                </div>
            `).join('');
            }
            function filterTechnicians() {
                const q = document.getElementById('techSearchInput').value.toLowerCase();
                renderTechList(technicians.filter(t => t.name.toLowerCase().includes(q) || t.category.toLowerCase().includes(q)));
            }
            function openTechModal() {
                document.getElementById('techModal').classList.remove('hidden');
                document.getElementById('techSearchInput').value = '';
                (async () => { await loadTechnicians(); renderTechList(technicians); setupTechVoiceSearch(); })();
            }
            function closeTechModal() { document.getElementById('techModal').classList.add('hidden'); }
            function setupTechVoiceSearch() {
                const btn = document.getElementById('techVoiceBtn');
                const rec = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (rec && btn) {
                    const r = new rec(); r.lang = 'en-IN';
                    btn.onclick = (e) => { e.preventDefault(); try { r.start(); } catch (err) { } };
                    r.onstart = () => { btn.classList.add('text-red-500', 'animate-pulse'); };
                    r.onresult = (ev) => { document.getElementById('techSearchInput').value = ev.results[0][0].transcript; filterTechnicians(); };
                    r.onend = () => { btn.classList.remove('text-red-500', 'animate-pulse'); };
                }
            }
        </script>

    <script>
        const searchInput = document.getElementById('homeSearchInput');
        const searchDropdown = document.getElementById('searchDropdown');

        // Hide dropdown when clicking outside
        document.addEventListener('click', function (e) {
            if (!searchInput.contains(e.target) && !searchDropdown.contains(e.target)) {
                searchDropdown.classList.add('hidden');
            }
        });

        searchInput.addEventListener('input', function (e) {
            const query = this.value.trim().toLowerCase();

            if (query.length === 0) {
                searchDropdown.classList.add('hidden');
                return;
            }

            if (window.allProducts && window.allProducts.length > 0) {
                const results = [];

                window.allProducts.forEach(p => {
                    const product = p.node;
                    const productName = product.name.toLowerCase();
                    // १. प्रोडक्ट का नाम चेक करें
                    if (productName.includes(query)) {
                        results.push({
                            id: product.id,
                            name: product.name,
                            thumbnail: product.thumbnail?.url,
                            price: product.pricing?.priceRange?.start?.gross?.amount,
                            currency: product.pricing?.priceRange?.start?.gross?.currency
                        });
                    }

                    // २. वेरिएंट्स के नाम चेक करें
                    if (product.variants) {
                        product.variants.forEach(v => {
                            if (v.name.toLowerCase().includes(query) && !productName.includes(query)) {
                                console.log('v.name.toLowerCase().includes(query)==============', v)
                                results.push({
                                    id: v.id, // वेरिएंट की ID
                                    name: `${v.name}`,
                                    thumbnail: v.media?.[0]?.url || product.thumbnail?.url,
                                    price: v.pricing?.price?.gross?.amount,
                                    currency: v.pricing?.price?.gross?.currency
                                });
                            }
                        });
                    }
                });

                renderDropdown(results);
            }
        });

        function renderDropdown(items) {
            if (items.length === 0) {
                searchDropdown.innerHTML = `<div class="p-4 text-center text-gray-500">No products found</div>`;
                searchDropdown.classList.remove('hidden');
                return;
            }

            const html = items.map(item => {
                const price = item.price ? item.price.toFixed(2) : "0.00";
                const symbol = item.currency === 'INR' ? '₹' : (item.currency || '');
                const formattedPrice = item.currency === 'INR' ? `₹${price}` : `${price} ${symbol}`;

                return `
                    <div class="p-3 hover:bg-gray-50 cursor-pointer border-b border-gray-100 last:border-0 flex items-center gap-3"
                         onclick="window.location.href='product.html?id=${item.id}'">
                        <img src="${item.thumbnail || 'images/placeholder.png'}" class="w-12 h-12 object-cover rounded" alt="${item.name}">
                        <div>
                            <h4 class="text-sm font-semibold text-gray-800">${item.name}</h4>
                            <p class="text-xs text-gold-600 font-bold">${formattedPrice}</p>
                        </div>
                    </div>
                `;
            }).join('');

            searchDropdown.innerHTML = html;
            searchDropdown.classList.remove('hidden');
        }

        // Voice Search Logic
        // Voice Search Logic
        // Voice Search Logic for Mobile & Desktop
        const voiceBtn = document.getElementById('voiceSearchBtn');
        const homeSearchInput = document.getElementById('homeSearchInput');

        // Mobile compatibility check
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.lang = 'en-IN';
            recognition.interimResults = false; // मोबाइल पर बेहतर प्रदर्शन के लिए
            recognition.maxAlternatives = 1;

            voiceBtn.addEventListener('click', (e) => {
                e.preventDefault(); // मोबाइल पर फॉर्म सबमिशन रोकने के लिए
                try {
                    recognition.start();
                } catch (err) {
                    console.log("Recognition already started");
                }
            });

            recognition.onstart = () => {
                voiceBtn.classList.add('text-red-500', 'animate-pulse');
                homeSearchInput.placeholder = "Listening...";
            };

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                homeSearchInput.value = transcript;
                homeSearchInput.dispatchEvent(new Event('input'));
                voiceBtn.classList.remove('text-red-500', 'animate-pulse');
            };

            recognition.onerror = (event) => {
                console.error("Speech Error:", event.error);
                voiceBtn.classList.remove('text-red-500', 'animate-pulse');
                if (event.error === 'not-allowed') alert("Please allow microphone access");
            };

            recognition.onend = () => {
                voiceBtn.classList.remove('text-red-500', 'animate-pulse');
                homeSearchInput.placeholder = "Search products...";
            };
        } else {
            voiceBtn.style.display = 'none';
        }
    </script>
    </header>

    <main class="container mx-auto px-4 py-12 max-w-4xl min-h-[70vh]">

        <div class="flex items-center justify-between mb-10">
            <h1 class="text-3xl md:text-5xl font-black uppercase tracking-tighter leading-none">Inquiry <span
                    class="gold-gradient-text">Cart</span></h1>
            <button id="prevOrdersBtn" onclick="showPreviousOrders()"
                class="hidden px-6 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest bg-white/5 border border-white/10 hover:border-gold transition">
                Order History
            </button>
        </div>

        <div id="cartItems" class="space-y-6"></div>

        <div id="cartSummary" class="mt-12 space-y-4"></div>

    </main>

    <!-- Address Modal -->
    <div id="addressModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center px-4">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" onclick="closeAddressModal()"></div>
        <div class="glass-panel w-full max-w-lg p-8 relative z-10 animate-in fade-in zoom-in duration-300">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black uppercase tracking-tight gold-gradient-text">Delivery Address</h2>
                <button onclick="closeAddressModal()" class="text-white/80 hover:text-white transition">
                    <ion-icon name="close-outline" class="text-3xl"></ion-icon>
                </button>
            </div>

            <form id="addressForm" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-black uppercase tracking-widest text-white/80 mb-1">First
                            Name</label>
                        <input type="text" id="firstName" required
                            class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:border-gold outline-none transition">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black uppercase tracking-widest text-white/80 mb-1">Last
                            Name</label>
                        <input type="text" id="lastName" required
                            class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:border-gold outline-none transition">
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-black uppercase tracking-widest text-white/80 mb-1">Mobile
                        No</label>
                    <input type="tel" id="mobileNo" required
                        class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:border-gold outline-none transition">
                </div>

                <div>
                    <label class="block text-[10px] font-black uppercase tracking-widest text-white/80 mb-1">Full
                        Address</label>
                    <textarea id="fullAddress" required rows="3"
                        class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:border-gold outline-none transition resize-none"></textarea>
                </div>

                <button type="submit"
                    class="w-full gold-gradient-bg text-black font-black uppercase py-4 rounded-xl tracking-[0.2em] shadow-xl hover:opacity-90 transition transform active:scale-95 mt-4">
                    Confirm & Send Inquiry
                </button>
            </form>
        </div>
    </div>

    <script>
        function loadCart() {
            const container = document.getElementById("cartItems");
            const summaryContainer = document.getElementById("cartSummary");
            const list = JSON.parse(localStorage.getItem("inquiryList") || "[]");

            if (list.length === 0) {
                container.innerHTML = `
          <div class="glass-panel p-5 flex flex-col items-center justify-center text-center">
            <div class="my-8 rounded-full bg-gold/5 flex items-center justify-center text-gold  animate-pulse">
              <svg width="36" height="36" viewBox="0 0 24 24" fill="none">
                <path d="M4 5H6L7.5 14H18L20 7H7" stroke="currentColor" strokeWidth="2"/>
                <circle cx="9" cy="19" r="1.5" stroke="currentColor" strokeWidth="2"/>
                <circle cx="17" cy="19" r="1.5" stroke="currentColor" strokeWidth="2"/>
             </svg>
            </div>
            <h2 class="text-3xl font-black uppercase tracking-tight mb-2">Cart is empty</h2>
            <p class="text-white/80 text-xs uppercase tracking-widest mb-8">Ready to start your design journey?</p>
            <a href="https://b-oneinterior.com/" class="gold-gradient-bg px-10 py-4 rounded-2xl text-black font-black uppercase text-sm tracking-widest hover:opacity-90 transition mb-3">Return to Collection</a>
          </div>
        `;
                summaryContainer.innerHTML = "";
                return;
            }

            let grandTotal = 0;

            const itemsHtml = list.map(item => {
                let price = parseFloat(item.price) || 0;
                const qty = parseInt(item.quantity || 1);
                const total = price * qty;
                grandTotal += total;

                const symbol = item.currency === 'INR' ? '₹' : (item.currency || '');
                const totalStr = symbol + total.toFixed(2);

                return `
        <div class="cart-item-card p-4 md:p-6 flex items-center gap-4 md:gap-8 relative group">
            <div class="absolute -top-10 -right-10 w-40 h-40 bg-gold/5 blur-[80px] rounded-full group-hover:bg-gold/10 transition"></div>
            
            <a href="product.html?id=${item.id}" class="w-24 h-24 md:w-32 md:h-32 rounded-[20px] overflow-hidden flex-shrink-0 border border-white/10 group-hover:border-gold/30 transition shadow-2xl">
                <img src="${item.image}" class="w-full h-full object-cover group-hover:scale-110 transition duration-700">
            </a>

            <div class="flex-grow min-w-0 flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div class="flex-grow min-w-0">
                    <p class="text-[10px] font-black text-gold uppercase tracking-[0.2em] mb-1">${item.category || 'Collection'}</p>
                    <h3 class="text-lg font-black text-white uppercase tracking-tight leading-none mb-1 truncate">${item.name}</h3>
                    <p class="text-xs font-bold text-white/80 uppercase tracking-widest">${symbol}${price.toFixed(2)} per unit</p>
                </div>

                <div class="flex items-center gap-3 justify-between md:justify-end">
                    <div class="qty-pill w-[120px]">
                        <button onclick="updateQty('${item.id}', -1)" class="qty-btn">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="5" y1="12" x2="19" y2="12" />
                            </svg>    
                        </button>
                        <span class="text-sm font-black text-white w-8 text-center">${qty}</span>
                        <button onclick="updateQty('${item.id}', 1)" class="qty-btn">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="5" x2="12" y2="19" />
                            <line x1="5" y1="12" x2="19" y2="12" />
                            </svg>
                            </button>
                    </div>

                    <div class="text-right min-w-[100px]">
                        <p class="text-[9px] font-bold text-white/60 uppercase tracking-widest mb-0.5">Subtotal</p>
                        <p class="text-xl font-black gold-gradient-text">${totalStr}</p>
                    </div>

                   
                </div>
                 <button class="remove-circle flex-shrink-0" onclick="removeFromCart('${item.id}')">
                        <ion-icon name="close-outline" class="text-2xl"></ion-icon>
                    </button>
            </div>
        </div>
        `;
            }).join("");

            container.innerHTML = itemsHtml;

            summaryContainer.innerHTML = `
        <div class="glass-panel p-8 md:p-10 flex flex-col md:flex-row items-center justify-between gap-8 mt-10 shadow-2xl relative overflow-hidden">
            <div class="absolute inset-0 bg-gold/[0.02] pointer-events-none"></div>
            <div>
                <p class="text-[10px] font-black text-white/60 uppercase tracking-[0.3em] mb-2">Total Inquiry Estimate</p>
                <p class="text-5xl md:text-6xl font-black gold-gradient-text tracking-tighter leading-none">₹${grandTotal.toFixed(2)}</p>
            </div>
            <button onclick="openAddressModal()" 
                class="w-full md:w-auto h-20 gold-gradient-bg px-3 rounded-[24px] text-black font-black uppercase text-sm tracking-[0.2em] hover:opacity-90 transition transform active:scale-95 shadow-2xl flex items-center justify-center gap-4">
                <ion-icon name="logo-whatsapp" class="text-3xl"></ion-icon>
                Inquire on Whatsapp
            </button>
        </div>
        <p class="text-center text-white/40 text-[9px] uppercase tracking-widest mt-6">Secure checkout provided by B-One Interior Design Team</p>
      `;
        }

        function removeFromCart(id) {
            let list = JSON.parse(localStorage.getItem("inquiryList") || "[]");
            list = list.filter(i => i.id !== id);
            localStorage.setItem("inquiryList", JSON.stringify(list));
            loadCart();
            updateCartBadge();
        }

        function updateCartBadge() {
            const badge = document.getElementById("cartCountBadge");
            if (!badge) return;
            const list = JSON.parse(localStorage.getItem("inquiryList") || "[]");
            const count = list.length;
            if (count > 0) {
                badge.textContent = count;
                badge.classList.remove("hidden");
            } else {
                badge.classList.add("hidden");
            }
        }

        function updateQty(id, change) {
            let list = JSON.parse(localStorage.getItem("inquiryList") || "[]");
            const item = list.find(i => i.id === id);
            if (item) {
                item.quantity = (parseInt(item.quantity) || 1) + change;
                if (item.quantity <= 0) {
                    list = list.filter(i => i.id !== id);
                }
                localStorage.setItem("inquiryList", JSON.stringify(list));
                loadCart();
                updateCartBadge();
            }
        }

        function openAddressModal() {
            const modal = document.getElementById("addressModal");
            modal.classList.remove("hidden");

            // Prefill from localStorage
            const savedAddress = JSON.parse(localStorage.getItem("userAddress") || "{}");
            if (savedAddress.firstName) document.getElementById("firstName").value = savedAddress.firstName;
            if (savedAddress.lastName) document.getElementById("lastName").value = savedAddress.lastName;
            if (savedAddress.mobileNo) document.getElementById("mobileNo").value = savedAddress.mobileNo;
            if (savedAddress.fullAddress) document.getElementById("fullAddress").value = savedAddress.fullAddress;
        }

        function closeAddressModal() {
            document.getElementById("addressModal").classList.add("hidden");
        }

        document.getElementById("addressForm").addEventListener("submit", function (e) {
            e.preventDefault();

            const addressData = {
                firstName: document.getElementById("firstName").value,
                lastName: document.getElementById("lastName").value,
                mobileNo: document.getElementById("mobileNo").value,
                fullAddress: document.getElementById("fullAddress").value
            };

            // Store in localStorage
            localStorage.setItem("userAddress", JSON.stringify(addressData));

            // Close modal and send WhatsApp inquiry
            closeAddressModal();
            sendWhatsappInquiry(addressData);
        });

        function sendWhatsappInquiry(addressData) {
            const list = JSON.parse(localStorage.getItem("inquiryList") || "[]");
            if (list.length === 0) return alert("Your cart is empty.");

            let message = "Hi, I am interested in the following products:\n\n";
            let grandTotal = 0;

            list.forEach((item, index) => {
                let price = parseFloat(item.price) || 0;
                const qty = parseInt(item.quantity || 1);
                const total = price * qty;
                grandTotal += total;

                const symbol = item.currency === 'INR' ? '₹' : (item.currency || '');
                const priceStr = symbol + price.toFixed(2);
                const totalStr = symbol + total.toFixed(2);

                message += `${index + 1}. *${item.name}*\n`;
                message += `   Qty: ${qty}\n`;
                message += `   Price: ${priceStr}\n`;
                message += `   Total: ${totalStr}\n\n`;
            });

            message += `*Grand Total: ₹${grandTotal.toFixed(2)}*\n\n`;

            if (addressData) {
                message += `*Delivery Details:*\n`;
                message += `Name: ${addressData.firstName} ${addressData.lastName}\n`;
                message += `Mobile: ${addressData.mobileNo}\n`;
                message += `Address: ${addressData.fullAddress}`;
            }

            const phoneNumber = "917738130131";
            const url = `https://wa.me/${phoneNumber}?text=${encodeURIComponent(message)}`;
            window.open(url, '_blank');

            // Storing order history with date as requested
            const oldOrders = JSON.parse(localStorage.getItem("orderList") || "[]");
            const newOrderEntry = {
                id: Date.now(),
                date: new Date().toLocaleString('en-IN', { dateStyle: 'long', timeStyle: 'short' }),
                items: list,
                grandTotal: grandTotal.toFixed(2),
                address: addressData
            };

            oldOrders.unshift(newOrderEntry); // Most recent first
            localStorage.setItem("orderList", JSON.stringify(oldOrders));

            localStorage.setItem("inquiryList", JSON.stringify([]));
            loadCart();
            updateCartBadge();
            checkPreviousOrders();
        }

        function showPreviousOrders() {
            const container = document.getElementById("cartItems");
            const summaryContainer = document.getElementById("cartSummary");
            const orders = JSON.parse(localStorage.getItem("orderList") || "[]");

            if (orders.length === 0) {
                container.innerHTML = `<p class="text-white/80 text-center py-20 uppercase tracking-widest">No previous orders found.</p>`;
                return;
            }

            summaryContainer.innerHTML = ""; // Clear summary on history view

            const ordersHtml = orders.map(order => {
                const itemsList = order.items.map(item => `
            <div class="flex items-center gap-4 py-2 border-b border-white/5 last:border-0">
                <img src="${item.image}" class="w-12 h-12 rounded-lg object-cover">
                <div class="flex-grow">
                    <p class="text-xs font-black uppercase text-white tracking-tight">${item.name}</p>
                    <p class="text-[9px] font-bold text-white/60 uppercase tracking-widest">${item.quantity} units</p>
                </div>
                <p class="text-xs font-black gold-gradient-text">${item.currency === 'INR' ? '₹' : ''}${(parseFloat(item.price) * item.quantity).toFixed(2)}</p>
            </div>
        `).join("");

                return `
        <div class="glass-panel p-6 mb-6">
            <div class="flex items-center justify-between mb-4 border-b border-gold/10 pb-4">
                <div>
                    <p class="text-[9px] font-black text-white/60 uppercase tracking-[0.2em] mb-1">Inquiry Date</p>
                    <p class="text-sm font-black text-white uppercase">${order.date}</p>
                </div>
                <div class="text-right">
                    <p class="text-[9px] font-black text-white/60 uppercase tracking-[0.2em] mb-1">Total</p>
                    <p class="text-xl font-black gold-gradient-text tracking-tighter">₹${order.grandTotal}</p>
                </div>
            </div>
            <div class="space-y-1">
                ${itemsList}
            </div>
        </div>
        `;
            }).join("");

            container.innerHTML = `
        <div class="flex items-center justify-between mb-8">
            <h2 class="text-xl font-black gold-gradient-text uppercase tracking-widest">Inquiry History</h2>
            <button onclick="loadCart()" class="text-[10px] font-black uppercase tracking-widest bg-gold/10 text-gold border border-gold/20 px-6 py-2 rounded-xl hover:bg-gold hover:text-black transition">Back to Cart</button>
        </div>
        ${ordersHtml}
      `;
        }

        function checkPreviousOrders() {
            const btn = document.getElementById("prevOrdersBtn");
            const oldOrderList = JSON.parse(localStorage.getItem("orderList") || "[]");
            if (oldOrderList?.length > 0) {
                btn.classList.remove("hidden");
            } else {
                btn.classList.add("hidden");
            }
        }

        loadCart();
        updateCartBadge();
        checkPreviousOrders();


    </script>

    <script src="placeholder.js"></script>
